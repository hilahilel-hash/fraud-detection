name: Weekly Fraud Training

on:
  schedule:
    # First attempt: 06:00 UTC = 09:00 Israel Summer Time
    - cron: '0 6 * * 0'
    # Retry attempt: 11:00 UTC = 14:00 Israel Summer Time (only runs if first failed)
    - cron: '0 11 * * 0'
  workflow_dispatch:

jobs:
  check-previous:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if we should run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR=$(date -u +%H)
          # At 05:00 UTC (first attempt) — always run
          if [ "$HOUR" -lt "09" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "First attempt at 09:00 — running."
            exit 0
          fi
          # At 10:00 UTC (retry) — only run if no successful run exists today
          SUCCESS_TODAY=$(gh run list \
            --workflow=weekly.yml \
            --repo ${{ github.repository }} \
            --limit 10 \
            --json conclusion,createdAt \
            --jq '[.[] | select(.createdAt | startswith("'"$(date -u +%Y-%m-%d)"'")) | select(.conclusion == "success")] | length')
          echo "Successful runs today: $SUCCESS_TODAY"
          if [ "$SUCCESS_TODAY" = "0" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "No successful run today — running retry at 13:00."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Already succeeded today — skipping retry."
          fi

  train:
    needs: check-previous
    if: needs.check-previous.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly training pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python weekly.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-artifacts
          path: /tmp/fraud_artifacts/
          retention-days: 90

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Weekly Fraud Training — ${{ job.status }}"
          to: hila.hilel@fiverr.com, gabriella.sacerdote@fiverr.com
          from: "Fraud Detection Bot <${{ secrets.GMAIL_USER }}>"
          body: "Weekly fraud training pipeline finished with status: ${{ job.status }}"
          ignore_cert: false
