name: Weekly Fraud Training

on:
  schedule:
    # 05:00 UTC = 08:00 Israel Summer Time (UTC+3)
    # In winter (UTC+2) change to: '0 6 * * 0'
    - cron: '0 5 * * 0'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly training pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          ARTIFACTS_FOLDER_ID: ${{ secrets.ARTIFACTS_FOLDER_ID }}
        run: python weekly.py
