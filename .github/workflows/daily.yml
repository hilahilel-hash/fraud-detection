name: Daily Fraud Scoring

on:
  schedule:
    # 08:00 UTC = 11:00 Israel Summer Time (UTC+3)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest model artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: weekly.yml
          name: fraud-model-artifacts
          path: /tmp/fraud_artifacts/
          search_artifacts: true

      - name: Run daily scoring pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python daily.py

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅ *Fraud Detection Daily Report*' || '❌ *Fraud Detection FAILED*' }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                  "fields": [
                    {
                      "title": "Date",
                      "value": "${{ github.run_id }}",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "${{ job.status }}",
                      "short": true
                    },
                    {
                      "title": "Results",
                      "value": "Excel saved as GitHub Actions artifact",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload Excel as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-fraud-report-${{ github.run_id }}
          path: /tmp/risky_transactions_explained_*.xlsx
          retention-days: 30
