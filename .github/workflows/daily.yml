name: Daily Fraud Scoring

on:
  schedule:
    # First attempt: 08:00 UTC = 11:00 Israel Summer Time
    - cron: '0 8 * * *'
    # Retry attempt: 11:00 UTC = 14:00 Israel Summer Time (only runs if first failed)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  check-previous:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if we should run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR=$(date -u +%H)
          # At 08:00 UTC (first attempt) — always run
          if [ "$HOUR" -lt "10" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "First attempt at 11:00 — running."
            exit 0
          fi
          # At 11:00 UTC (retry) — only run if no successful run exists today
          SUCCESS_TODAY=$(gh run list \
            --workflow=daily.yml \
            --repo ${{ github.repository }} \
            --limit 10 \
            --json conclusion,createdAt \
            --jq '[.[] | select(.createdAt | startswith("'"$(date -u +%Y-%m-%d)"'")) | select(.conclusion == "success")] | length')
          echo "Successful runs today: $SUCCESS_TODAY"
          if [ "$SUCCESS_TODAY" = "0" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "No successful run today — running retry at 14:00."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Already succeeded today — skipping retry."
          fi

  score:
    needs: check-previous
    if: needs.check-previous.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set run date
        run: echo "RUN_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest model artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: weekly.yml
          name: fraud-model-artifacts
          path: /tmp/fraud_artifacts/
          search_artifacts: true

      - name: Run daily scoring pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python daily.py

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Fraud Detection Daily Report — ${{ env.RUN_DATE }}"
          to: hila.hilel@fiverr.com, gabriella.sacerdote@fiverr.com
          from: "Fraud Detection Bot <${{ secrets.GMAIL_USER }}>"
          html_body: file:///tmp/email_summary.html
          attachments: /tmp/risky_transactions_explained_*.xlsx
          ignore_cert: false

      - name: Upload Excel as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-fraud-report-${{ github.run_id }}
          path: /tmp/risky_transactions_explained_*.xlsx
          retention-days: 30
