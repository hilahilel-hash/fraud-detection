name: Daily Fraud Scoring

on:
  schedule:
    # 08:00 UTC = 11:00 Israel Summer Time (UTC+3)
    # In winter (UTC+2) change to: '0 9 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set run date
        run: echo "RUN_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scoring pipeline
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          ARTIFACTS_FOLDER_ID: ${{ secrets.ARTIFACTS_FOLDER_ID }}
          DAILY_FOLDER_ID: ${{ secrets.DAILY_FOLDER_ID }}
        run: python daily.py

      - name: Send email summary
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Fraud Detection Daily Report — ${{ env.RUN_DATE }}"
          to: hila.hilel@fiverr.com
          from: "Fraud Detection Bot <${{ secrets.GMAIL_USER }}>"
          html_body: file:///tmp/email_summary.html
          ignore_cert: false
