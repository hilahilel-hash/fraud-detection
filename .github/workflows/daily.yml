name: Daily Fraud Scoring

on:
  schedule:
    # 08:00 UTC = 11:00 Israel Summer Time (UTC+3)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest model artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: weekly.yml
          name: fraud-model-artifacts
          path: /tmp/fraud_artifacts/
          search_artifacts: true

      - name: Run daily scoring pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python daily.py

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Fraud Detection Daily Report — ${{ env.RUN_DATE }}"
          to: hila.hilel@fiverr.com
          from: "Fraud Detection Bot <${{ secrets.GMAIL_USER }}>"
          html_body: file:///tmp/email_summary.html
          attachments: /tmp/risky_transactions_explained_*.xlsx
          ignore_cert: false

      - name: Upload Excel as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-fraud-report-${{ github.run_id }}
          path: /tmp/risky_transactions_explained_*.xlsx
          retention-days: 30
