name: Test Run (Weekly + Daily)

on:
  workflow_dispatch:

jobs:
  weekly-then-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WEEKLY pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python weekly.py

      - name: Run DAILY pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python daily.py

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅ TEST PASSED' || '❌ TEST FAILED' }} — Fraud Pipeline Test Run"
          to: hila.hilel@fiverr.com
          from: "Fraud Detection Bot <${{ secrets.GMAIL_USER }}>"
          html_body: file:///tmp/email_summary.html
          attachments: /tmp/risky_transactions_explained_*.xlsx
          ignore_cert: false

      - name: Upload Excel as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-fraud-report-${{ github.run_id }}
          path: /tmp/risky_transactions_explained_*.xlsx
          retention-days: 30
