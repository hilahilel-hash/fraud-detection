name: Test Run (Weekly + Daily)

on:
  workflow_dispatch:

jobs:
  weekly-then-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WEEKLY pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python weekly.py

      - name: Run DAILY pipeline
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python daily.py

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅ *TEST PASSED — Fraud Pipeline works!*' || '❌ *TEST FAILED — check GitHub Actions logs*' }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                  "fields": [
                    {
                      "title": "Run ID",
                      "value": "${{ github.run_id }}",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "${{ job.status }}",
                      "short": true
                    },
                    {
                      "title": "Logs",
                      "value": "https://github.com/hilahilel-hash/fraud-detection/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload Excel as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-fraud-report-${{ github.run_id }}
          path: /tmp/risky_transactions_explained_*.xlsx
          retention-days: 30
